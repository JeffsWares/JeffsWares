<DOCTYPE! html>
<html>
    <head>
        <style>
            h1 {
                font-size:100px;
                font-weight: 900;
                font-family: Impact;
                text-shadow: 2px 2px 0 black;
                text-align: center;
            }
            
            body {
                margin: 0;
                min-height: 100vh;
                background: white;
                color: #111;
            }

            .side-stripes{
                position: fixed;
                top: 0;
                bottom: 0;
                width: 160px;
                pointer-events: none;
            }

            .side-stripes.left { left: 0; }
            .side-stripes.right { right: 0; }

            .side-stripes .stripe{
                position: absolute;
                top: 0;
                bottom: 0;
                width: 28px;
                background: #333;
                opacity: 0.95;
            }

            .side-stripes.left .stripe:nth-child(1){ left: 16px; }
            .side-stripes.left .stripe:nth-child(2){ left: 56px; }
            .side-stripes.left .stripe:nth-child(3){ left: 96px; }

            .side-stripes.right .stripe:nth-child(1){ right: 16px; }
            .side-stripes.right .stripe:nth-child(2){ right: 56px; }
            .side-stripes.right .stripe:nth-child(3){ right: 96px; }

            .content {
                position: relative;
                z-index: 1;
                padding-left: 180px;
                padding-right: 180px;
            }
            p {
                text-align: center;
                font-size: 20px;
                max-width: 800px;
                margin: 0 auto;
                font-family: Optima, sans-serif;
                margin-bottom: 70px;
            }

            h2 {
                text-align:center;
                font-size: 50px;
                max-width: 500px;
                margin: 0 auto;
                font-family: Impact;
                margin-bottom: 40px;
            }

        </style>
    </head>

    <body>
        <div class="side-stripes left" aria-hidden="true">
            <div class="stripe"></div>
            <div class="stripe"></div>
            <div class="stripe"></div>
        </div>

        <div class="side-stripes right" aria-hidden="true">
            <div class="stripe"></div>
            <div class="stripe"></div>
            <div class="stripe"></div>
        </div>

        <div class="content">
            <h1>Contact Page</h1>
        </div>
        <h2>Email: icooltech@outlook.com</h2>
        <h2>Business Inquiries ONLY!</h2>
        <p><a href="index.html">Back to Home</a></p>
        <p><a href="products.html">View Products</a></p>
    </body>













</html>
